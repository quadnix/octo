services:
  localstack:
    container_name: "localstack-aws-dynamodb-service"
    environment:
      DYNAMODB_REMOVE_EXPIRED_ITEMS: 1
      DYNAMODB_TTL_INTERVAL: 1
    image: localstack/localstack:4.5.0
    platform: linux/arm64/v8
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    volumes:
      - "localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
  localstack_data:
